summary: GNU implementation of the famous stream editor
src-url: https://ftp.gnu.org/gnu/sed/sed-4.10.tar.xz
src-sha: b8e72182b2ec96a3574e2998c47b7aaa64cc20ce000d8e9ac313cc07cecf28c7
license: GPL-3.0-or-later

install: |
    configure \
        --program-prefix=g \
        --without-selinux \
        --with-included-regex \
        --disable-acl \
        --disable-assert

dotweak: ln -s gsed bin/sed
