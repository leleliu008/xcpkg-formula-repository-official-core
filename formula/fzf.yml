summary: A command-line fuzzy finder written in Go
src-url: https://github.com/junegunn/fzf/archive/refs/tags/v0.71.0.tar.gz
src-sha: 2420f4df1e7c3207a5a74b30c32ff3f3fa88ab6e2eb9e0da92cb27905271a525
