pkgtype: exe+lib
summary: An open source graph visualization software
web-url: https://www.graphviz.org/
src-url: https://gitlab.com/graphviz/graphviz/-/archive/14.1.5/graphviz-14.1.5.tar.bz2
src-sha: 554a44a6a098c246349f8a14704fe801b82a286d615bdc1768ba5b53ae6bf737
license: EPL-1.0
dep-pkg: libgd libpango
dep-upp: gm4 flex bison gawk git python3 libtool
bsystem: autogen

install: |
    configure \
        --disable-swig \
        --disable-php \
        --disable-tcl \
        --without-gdk \
        --without-gtk \
        --without-qt \
        --without-x

dotweak: |
    cd lib
    ln -s graphviz/lib*.dylib .
    printf 'Requires: libxdot libcdt libcgraph libpathplan expat libz\n' >> pkgconfig/libgvc.pc
