summary: An extraordinarily fast, memory-efficient, memory-mapped, key-value database
web-url: https://symas.com/lmdb
src-url: https://github.com/LMDB/lmdb/archive/refs/tags/LMDB_0.9.35.tar.gz
src-sha: 18b021fd589d30cc08860a9550a30ae51637117451385e9581616da751326632
license: OLDAP-2.8

bscript: libraries/liblmdb

install: |
    gmakew clean
    gmakew CC=$CC CFLAGS="'$CFLAGS $CPPFLAGS'" LDFLAGS="'$LDFLAGS'" AR="$AR" SOEXT=.dylib
    install_incs lmdb.h
    install_libs liblmdb.a liblmdb.dylib
