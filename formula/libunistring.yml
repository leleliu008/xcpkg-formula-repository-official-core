summary: C library for manipulating Unicode strings
src-url: https://ftp.gnu.org/gnu/libunistring/libunistring-1.4.2.tar.gz
src-sha: e82664b170064e62331962126b259d452d53b227bb4a93ab20040d846fec01d8
license: GPL-2.0-only
dep-pkg: libiconv

install: |
    configure \
        --with-libiconv-prefix="$libiconv_INSTALL_DIR" \
        --enable-threads=posix \
        --enable-relocatable \
        --enable-namespacing

dotweak: |
    writepc libunistring <<EOF
    prefix=\${pcfiledir}/../..
    exec_prefix=\${prefix}
    libdir=\${exec_prefix}/lib
    includedir=\${prefix}/include

    Name: libunistring
    Description: $PACKAGE_SUMMARY
    Version: $PACKAGE_VERSION
    Cflags: -I\${includedir}
    Libs: -L\${libdir} -lunistring
    Requires: libiconv
    EOF
