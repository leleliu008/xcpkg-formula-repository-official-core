summary: Arbitrary precision calculator
web-url: http://www.isthe.com/chongo/tech/comp/calc/
src-url: https://github.com/lcn2/calc/archive/refs/tags/v2.16.1.2.tar.gz
src-sha: cb5b0576c3d206ed55b6929cc3a1ebc5afedbfdc70d528274cbac8e650c56d77
license: LGPL-2.1-or-later
dep-pkg: libreadline

install: |
    gmakew clean
    gmakew install \
            BLD_TYPE=calc-static-only \
            LCC="$CC" \
            EXTRA_CFLAGS="'$CFLAGS $CPPFLAGS'" \
            EXTRA_LDFLAGS="'$LDFLAGS'" \
            BINDIR="$PACKAGE_INSTALL_DIR/bin" \
            LIBDIR="$PACKAGE_INSTALL_DIR/lib" \
            MANDIR="$PACKAGE_INSTALL_DIR/man/man1" \
            CALC_INCDIR="$PACKAGE_INSTALL_DIR/include/calc" \
            CALC_SHAREDIR="$PACKAGE_INSTALL_DIR/share/calc" \
            USE_READLINE=-DUSE_READLINE \
            READLINE_LIB=-lreadline \
            READLINE_EXTRAS="'$LDFLAGS -lhistory -lncurses'"
