summary: A collection of Linux utilities
git-url: https://github.com/util-linux/util-linux
src-url: https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.42/util-linux-2.42.2.tar.xz
src-sha: 03a05d3adf9602ef128f2da05b84b3205ce60c351e5737c0370f74000679ce8a
license: GPL-2.0-or-later
dep-pkg: libreadline libsqlite3 libxcrypt libz

install: |
    configure \
        --without-python \
        --without-systemd \
        --enable-widechar \
        --enable-libuuid \
        --disable-use-tty-group \
        --disable-chfn-chsh \
        --disable-login \
        --disable-su \
        --disable-runuser \
        --disable-asciidoc \
        --disable-makeinstall-chown \
        --disable-makeinstall-setuid \
        --disable-liblastlog2 \
        --disable-libmount \
        --disable-ipcrm \
        --disable-ipcs \
        --disable-wall
