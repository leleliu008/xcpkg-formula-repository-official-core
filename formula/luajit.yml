summary: Just-In-Time Compiler (JIT) for the Lua programming language
web-url: https://luajit.org/
git-url: https://github.com/LuaJIT/LuaJIT
git-sha: 18b087cd2cd4ddc4a79782bf155383a689d5093d
version: 2.1.1774896198
license: MIT

install: |
    export MACOSX_DEPLOYMENT_TARGET="$TARGET_PLATFORM_VERS"
    gmakew clean amalg install \
        PREFIX="$PACKAGE_INSTALL_DIR" \
        CC="$CC" \
        LD="$CC" \
        CFLAGS="'$CFLAGS'" \
        LDFLAGS="'$LDFLAGS'" \
        HOST_CC="'$CC_FOR_BUILD'" \
        HOST_LD="$CC_FOR_BUILD" \
        TARGET_CC="$CC" \
        TARGET_LD="$CC" \
        TARGET_AR="'$AR rcus'" \
        TARGET_STRIP=true \
        TARGET_SYS=Darwin \
        HOST_SYS=Darwin \
        Q=

dotweak: gsed -i 's|-Wl,-E||' lib/pkgconfig/luajit.pc
