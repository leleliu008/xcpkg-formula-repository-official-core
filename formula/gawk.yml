summary: GNU awk utility
src-url: https://ftp.gnu.org/gnu/gawk/gawk-5.4.0.tar.xz
src-sha: 3dd430f0cd3b4428c6c3f6afc021b9cd3c1f8c93f7a688dc268ca428a90b4ac1
license: GPL-3.0-or-later
dep-pkg: libreadline libmpfr

install: |
    configure \
        --with-pic \
        --with-readline="$libreadline_INSTALL_DIR" \
        --with-mpfr="$libmpfr_INSTALL_DIR" \
        --enable-extensions \
        --enable-lint \
        --enable-mpfr \
        --disable-pma \
        --disable-builtin-intdiv0
