summary: Reusable library for GPU-accelerated image/video processing primitives
git-url: https://code.videolan.org/videolan/libplacebo
src-url: https://code.videolan.org/videolan/libplacebo/-/archive/v7.360.1/libplacebo-v7.360.1.tar.bz2
src-sha: 937aa5eeea596798b3274d362de2e3bd32bc537a66d149dd85043349c74dffb6
license: LGPL-2.1-or-later
dep-pkg: vulkan-loader shaderc liblcms2 fastfloat
dep-pip: MarkupSafe Jinja2 glad2

install: |
    mesonw \
        -Dfuzz=false \
        -Ddemos=false \
        -Dtests=false \
        -Dbench=false \
        -Dlcms=enabled \
        -Dvulkan=enabled \
        -Dopengl=enabled \
        -Dshaderc=enabled \
        -Dunwind=disabled \
        -Dvulkan-registry=$vulkan_headers_INSTALL_DIR/share/vulkan/registry/vk.xml
