summary: A command-line tool to display file content or data from standard input in a human-readable format
web-url: https://www.25thandclement.com/~william/projects/hexdump.c.html
src-url: https://github.com/wahern/hexdump/archive/refs/tags/rel-20181215.tar.gz
src-sha: 882975323317f595093125467d7b9604f78bded7ba1005f5fc17e33358cdb0fa

dopatch: gsed -i '/VENDOR_OS =/d' GNUmakefile

install: |
    gmakew distclean
    gmakew VENDOR_OS=Darwin VENDOR_CC="$CC" CC="$CC" CPPFLAGS="'$CPPFLAGS'" CFLAGS="'$CFLAGS'" SOFLAGS="'$LDFLAGS'"
    install_bins hexdump
    install_incs hexdump.h
    install_libs libhexdump.dylib
