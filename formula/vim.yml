summary: Vi IMproved - enhanced vi editor
web-url: https://www.vim.org/
src-url: https://github.com/vim/vim/archive/refs/tags/v9.2.0350.tar.gz
src-sha: fd07df5cfd0a5e479c9320bef72d72e627923017ef20373979a4d04670db130d
license: Vim
dep-pkg: libncurses libintl python3 liblua
binbstd: 1

install: |
    configure \
        --without-x \
        --with-lua-prefix="$liblua_INSTALL_DIR" \
        --with-tlib=ncursesw \
        --with-compiledby=xcpkg \
        --with-features=huge \
        --enable-cscope \
        --enable-terminal \
        --enable-multibyte \
        --enable-perlinterp=no \
        --enable-rubyinterp=no \
        --enable-python3interp \
        --enable-luainterp \
        --enable-gui=no
