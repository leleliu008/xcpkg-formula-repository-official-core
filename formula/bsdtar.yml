summary: BSD tar
git-url: https://github.com/libarchive/libarchive
web-url: https://www.libarchive.org/
src-url: https://www.libarchive.org/downloads/libarchive-3.8.7.tar.xz
src-sha: d3a8ba457ae25c27c84fd2830a2efdcc5b1d40bf585d4eb0d35f47e99e5d4774
license: BSD-2-Clause
dep-pkg: liblz4 liblzo libzstd liblzma libbz2 libz libexpat libopenssl

install: |
    configure \
        --enable-acl \
        --enable-xattr \
        --enable-bsdtar \
        --enable-bsdcat \
        --enable-bsdcpio \
        --enable-bsdunzip \
        --enable-static \
        --disable-shared \
        --without-mbedtls \
        --without-nettle \
        --without-libb2 \
        --without-xml2 \
        --without-cng \
        --with-openssl \
        --with-expat \
        --with-zlib \
        --with-lzma \
        --with-bz2lib \
        --with-lz4 \
        --with-lzo2 \
        --with-zstd \
        --without-iconv

dotweak: rm -rf lib/ include/ share/man/man[35]
