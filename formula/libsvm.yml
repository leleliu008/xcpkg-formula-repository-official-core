summary: Library for support vector machines
git-url: https://github.com/cjlin1/libsvm
web-url: https://www.csie.ntu.edu.tw/~cjlin/libsvm/
src-url: https://www.csie.ntu.edu.tw/~cjlin/libsvm/libsvm-3.37.tar.gz
src-sha: 1fa553edc776be3d62fab4607b96ffa505093ea6e3e759a4c7f96294ff75e29a
license: BSD-3-Clause

install: |
    run $CXX -c $CXXFLAGS $CPPFLAGS -o svm.o ../svm.cpp
    run $CXX -dynamiclib $LDFLAGS -o libsvm.dylib svm.o
    run $AR crs libsvm.a svm.o
    install_libs libsvm.*
    install_incs ../svm.h
