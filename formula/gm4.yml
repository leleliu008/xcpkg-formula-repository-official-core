summary: Macro processing language
git-url: https://git.savannah.gnu.org/git/m4.git
web-url: https://www.gnu.org/software/m4
src-url: https://ftp.gnu.org/gnu/m4/m4-1.4.21.tar.xz
src-sha: f25c6ab51548a73a75558742fb031e0625d6485fe5f9155949d6486a2408ab66
license: GPL-3.0-or-later

install: |
    configure \
        --enable-threads=posix \
        --enable-c++ \
        --enable-changeword \
        --disable-assert \
        --disable-gcc-warnings \
        --without-dmalloc \
        --with-included-regex \
        --program-prefix=g

dotweak: run ln -s gm4 bin/m4
