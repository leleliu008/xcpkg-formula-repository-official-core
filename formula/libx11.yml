summary: X.Org protocol client library
src-url: https://www.x.org/archive/individual/lib/libX11-1.8.13.tar.gz
src-sha: acf0e7cd7541110e6330ecb539441a2d53061f386ec7be6906dfde0de2598470
license: MIT
dep-pkg: libxcb xtrans

prepare: |
    unset  LC_ALL
    export LC_CTYPE=C

install: |
    configure \
        --enable-tcp-transport \
        --enable-unix-transport \
        --enable-local-transport \
        --enable-ipv6 \
        --enable-loadable-i18n \
        --enable-xthreads \
        --enable-specs=no
