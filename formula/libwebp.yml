summary: Image format providing lossless and lossy compression for web images
web-url: https://chromium.googlesource.com/webm/libwebp
src-url: https://github.com/webmproject/libwebp/archive/refs/tags/v1.6.0.tar.gz
src-sha: 93a852c2b3efafee3723efd4636de855b46f9fe1efddd607e1f42f60fc8f2136
license: BSD-3-Clause

dopatch: gsed -i 's|CMAKE_INSTALL_DATADIR|CMAKE_INSTALL_LIBDIR|' CMakeLists.txt

install: |
    cmakew 2 \
        -DWEBP_BUILD_EXTRAS=OFF \
        -DWEBP_BUILD_CWEBP=OFF \
        -DWEBP_BUILD_DWEBP=OFF \
        -DWEBP_BUILD_VWEBP=OFF \
        -DWEBP_BUILD_WEBPMUX=OFF \
        -DWEBP_BUILD_WEBPINFO=OFF \
        -DWEBP_BUILD_GIF2WEBP=OFF \
        -DWEBP_BUILD_IMG2WEBP=OFF \
        -DWEBP_BUILD_ANIM_UTILS=OFF

dotweak: gsed -i '/^Libs:/s|$| -lm|' lib/pkgconfig/libsharpyuv.pc
