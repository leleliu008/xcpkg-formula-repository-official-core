summary: A command-line tool to generate compilation database for clang tooling
src-url: https://github.com/rizsotto/Bear/archive/refs/tags/4.0.4.tar.gz
src-sha: 373007f2d7b322d5e1d3dd4c4759b181f0e9b045151f2f5c629537341b9d2167
license: GPL-3.0-or-later

install: |
    cargow install --path bear
    cargow install --path intercept-wrapper

dotweak: |
    run install -d libexec/
    run mv bin/wrapper libexec/
